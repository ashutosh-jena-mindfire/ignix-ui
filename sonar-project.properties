# ==============================================
# SonarCloud Project Configuration
# ==============================================

# ── Project Identity ──────────────────────────
# Find these values on SonarCloud → Your Project → Information
sonar.projectKey= ashutosh-jena-mindfire_ignix-ui
sonar.organization=ashutosh-jena-mindfire
sonar.projectName=ignix-ui
sonar.projectVersion=1.0.0

# ── Source & Test Directories ─────────────────
sonar.sources=apps/storybook/src/components
sonar.tests=packages/registry/components
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.test.js,**/*.test.jsx
 
# ── Exclusions ────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/public/**,\
  **/.next/**,\
  **/out/**,\
  **/storybook-static/**,\
  **/.storybook/**
 
# Exclude test & index files from coverage
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/index.ts,\
  **/index.tsx,\
  **/stories/**,\
  **/*.stories.tsx,\
  **/*.stories.ts
 
# ── Coverage Report ───────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info
 
# ── Language & Encoding ───────────────────────
sonar.sourceEncoding=UTF-8
 
# ── TypeScript ────────────────────────────────
sonar.typescript.tsconfigPath=tsconfig.json